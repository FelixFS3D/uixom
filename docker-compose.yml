version: '3.8'

services:
  # MongoDB Database
  db:
    image: mongo:7-jammy
    container_name: uixom-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-uixom}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - uixom-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: uixom-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5005
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@db:27017/${MONGO_DB:-uixom}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-15}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_TEAM_TO: ${EMAIL_TEAM_TO:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
    ports:
      - "5005:5005"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - uixom-network
    volumes:
      - ./server/logs:/app/server/logs

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5005}
    container_name: uixom-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - uixom-network

networks:
  uixom-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
